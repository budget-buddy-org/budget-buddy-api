name: Docker Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build and publish'
        required: true
        default: 'main'

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/arm64, linux/amd64]
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref }}

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
        with:
          cache-provider: basic

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract build metadata
        id: meta
        run: |
          ARCH=$(echo "${{ matrix.platform }}" | cut -d'/' -f2)
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          echo "arch=${ARCH}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew bootBuildImage -x test \
            --imagePlatform=${{ matrix.platform }} \
            --imageName=${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.arch }}

      # Scan amd64 image before pushing — CRITICAL and HIGH findings are uploaded
      # to the Security tab for visibility but do not block the release.
      - name: Scan image with Trivy (SARIF)
        if: matrix.platform == 'linux/amd64'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}-amd64
          format: sarif
          output: trivy-amd64.sarif
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload amd64 scan results to GitHub Security tab
        if: always() && matrix.platform == 'linux/amd64'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-amd64.sarif
          category: trivy-amd64

      - name: Push Docker image
        run: docker push ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.arch }}

  docker-manifest:
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      packages: write
      id-token: write
      security-events: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        id: manifest
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:${VERSION} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:${VERSION}-arm64 \
            ${{ env.IMAGE_NAME }}:${VERSION}-amd64
          DIGEST=$(docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:${VERSION} --format '{{.Manifest.Digest}}')
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Sign the published manifest digest with Cosign using GitHub OIDC —
      # no long-lived signing key stored or rotated.
      - name: Sign image with Cosign (keyless)
        run: |
          cosign sign --yes \
            ${{ env.IMAGE_NAME }}@${{ steps.manifest.outputs.digest }}

      # Scan the arm64 image by digest to catch arch-specific vulnerabilities.
      # Non-blocking — findings are surfaced in the Security tab only.
      - name: Scan arm64 image with Trivy
        id: trivy-arm64
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.manifest.outputs.version }}-arm64
          format: sarif
          output: trivy-arm64.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        env:
          TRIVY_PLATFORM: linux/arm64

      - name: Upload arm64 scan results to GitHub Security tab
        if: always() && steps.trivy-arm64.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-arm64.sarif
          category: trivy-arm64
